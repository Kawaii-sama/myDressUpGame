<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dress Up Game</title>

</head>
<body>
    <embed type="image/png" src="dressUp.png" width="100%" height="100%">

        <style>
            html , body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;

            background-image: url('dressUp.jpeg'); background-size: contain;background-position: center; background-repeat: no-repeat; background-size:cover; background-color: #1a1a1a; }

            .glass-overlay {
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100;

                display: flex; justify-content: center; align-items: center;

                background: rgba(255, 255, 255, 0.05);
                -webkit-backdrop-filter: blur(12px);
                backdrop-filter: blur(12px);
            }

            .menu-card {
                background: #e2d8c3;
                padding: 60px 60px;
                border-radius: 40px;
                border: 20px solid  rgb(233, 120, 164);;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                text-align: center;
            }

            .menu-title {
                color: #ffffff;
                font-family: sans-serif;
                margin-bottom: 25px;
                text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            }
        </style>

        <div class = "glass-overlay">
            <div class = "menu-card"> 
                <h1 class = "menu-title">My Dress Up Game</h1>
                <button class = "play-btn"> Play </button>
            </div>
        </div>

</body>
</html>
